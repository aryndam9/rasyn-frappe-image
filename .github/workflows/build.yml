name: Build Custom Frappe Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx is required for --secret and --push flags
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Clone the full frappe_docker repo so the build context
      # includes resources/core/main-entrypoint.sh at the root
      - name: Clone frappe_docker
        run: git clone https://github.com/frappe/frappe_docker.git

      - name: Build and push
        run: |
          # Copy your apps.json into the frappe_docker directory
          cp apps.json frappe_docker/

          cd frappe_docker

          docker buildx build \
            --platform=linux/amd64 \
            --build-arg=FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg=FRAPPE_BRANCH=version-15 \
            --secret=id=apps_json,src=apps.json \
            --file=images/layered/Containerfile \
            --tag=ghcr.io/${{ github.repository }}:version-15 \
            --push \
            .